<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sin Etiquetas — 6 posts IG</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin:0; padding:0; background:#1a1210; font-family:"Manrope", system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="posts.jsx"></script>
<script type="text/babel">
  const {
    PostSinMiedo, PostACiegas, PostMaridajes,
    PostHistorias, PostManifiesto, PostNomade,
  } = window.Posts;

  const W = 1080, H = 1350;

  function App() {
    return (
      <DesignCanvas title="Sin Etiquetas — 6 publicaciones IG" subtitle="1080 × 1350 · feed">
        <DCSection id="feed" title="Feed" subtitle="Mismo sistema, distinto papel — pensados para verse seguidos en grilla.">
          <DCArtboard id="01" label="01 · Sin miedo al vino" width={W} height={H}>
            <PostSinMiedo />
          </DCArtboard>
          <DCArtboard id="02" label="02 · A ciegas" width={W} height={H}>
            <PostACiegas />
          </DCArtboard>
          <DCArtboard id="03" label="03 · Maridajes imperfectos" width={W} height={H}>
            <PostMaridajes />
          </DCArtboard>
          <DCArtboard id="04" label="04 · Historias y copas" width={W} height={H}>
            <PostHistorias />
          </DCArtboard>
          <DCArtboard id="05" label="05 · Acá no hay expertos (manifiesto)" width={W} height={H}>
            <PostManifiesto />
          </DCArtboard>
          <DCArtboard id="06" label="06 · Modelo nómade" width={W} height={H}>
            <PostNomade />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
