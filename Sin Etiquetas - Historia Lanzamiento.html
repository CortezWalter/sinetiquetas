<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sin Etiquetas — Historia de lanzamiento</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin:0; padding:0; background:#1a1210; font-family:"Manrope", system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="launch-stories.jsx"></script>
<script type="text/babel">
  const { StoryLaunch1, StoryLaunch2 } = window.LaunchStories;
  const W = 1080, H = 1920;

  function App() {
    return (
      <DesignCanvas
        title="Sin Etiquetas — Historia de lanzamiento"
        subtitle="2 frames · 1080 × 1920 · logo + manifiesto">
        <DCSection
          id="launch"
          title="Lanzamiento oficial"
          subtitle="Primer historia. Subir los 2 frames en orden.">
          <DCArtboard id="l1" label="01 · Logo + anuncio" width={W} height={H}>
            <StoryLaunch1 />
          </DCArtboard>
          <DCArtboard id="l2" label="02 · Manifiesto" width={W} height={H}>
            <StoryLaunch2 />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
